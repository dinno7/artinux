definitions:
  artifacts.DeleteArtifactsDto:
    properties:
      object_keys:
        items:
          type: string
        type: array
    type: object
  artifacts.UploadedArtifactDto:
    properties:
      error:
        type: string
      file_name:
        type: string
      object_key:
        type: string
      ok:
        type: boolean
    type: object
  artifacts.UploadedArtifactsDto:
    properties:
      artifacts:
        items:
          $ref: '#/definitions/artifacts.UploadedArtifactDto'
        type: array
    type: object
  entities.Artifact:
    properties:
      architecture:
        type: string
      checksum:
        type: string
      extension:
        type: string
      hostname:
        type: string
      name:
        type: string
      object_key:
        type: string
      original_name:
        type: string
      os:
        type: string
      size:
        type: integer
      uploaded_at:
        type: string
      username:
        type: string
    type: object
  http.dependency:
    description: Standard API response wrapper with status, message, and data
    properties:
      name:
        type: string
      ok:
        type: boolean
    type: object
  http.healthResult:
    properties:
      dependencies:
        items:
