info:
  contact:
    email: tahadlrb7@gmail.com
    name: Taha Delroba
  description: Artifact Manager
  termsOfService: http://swagger.io/terms/
  title: Artinux
paths:
  /artifacts:
    delete:
      consumes:
      - application/json
      description: Deletes one or more artifacts. Supports deletion via object key
        in the URL path (single delete) or via request body with multiple object keys
        (batch delete).
      parameters:
      - description: Multiple object keys to delete (in request body)
        in: body
        name: request
        schema:
          $ref: '#/definitions/artifacts.DeleteArtifactsDto'
      produces:
      - application/json
      responses:
        "204":
          description: Artifacts deleted successfully
        "400":
          description: Bad request - invalid payload, empty keys, or deletion error
          schema:
            $ref: '#/definitions/response.ErrorResponseData-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponseData-any'
      summary: Delete artifacts
      tags:
      - artifacts
    get:
      consumes:
      - application/json
      description: Retrieves a filtered, paginated list of artifacts from storage.
        Supports prefix filtering and result limiting.
      parameters:
      - description: Filter artifacts by key prefix
        example: artifacts/linux/amd64/
        in: query
        name: prefix
        type: string
      - description: Maximum number of results
        example: 50
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List retrieved successfully
          schema:
            $ref: '#/definitions/response.ResponseSuccessData-array_entities_Artifact'
        "400":
          description: Bad request - invalid parameters
          schema:
            $ref: '#/definitions/response.ErrorResponseData-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponseData-any'
      summary: List artifacts
      tags:
      - artifacts
    post:
      consumes:
      - multipart/form-data
      description: Uploads a single artifact file with system metadata (arch, os,
        username, hostname). Supports multipart/form-data with file and form fields.
      parameters:
      - description: Target architecture (e.g., amd64, arm64)
        example: amd64
        in: formData
        name: arch
        required: true
        type: string
      - description: Target operating system (e.g., linux, darwin, windows)
        example: linux
        in: formData
        name: os
        required: true
        type: string
      - description: Username of the uploader machine
        example: johndoe
        in: formData
        name: username
        required: true
        type: string
      - description: Hostname of the source machine
        example: web-server-01
        in: formData
        name: hostname
        required: true
        type: string
      - collectionFormat: csv
        description: Artifact file to upload (multipart)
        in: formData
        items:
          type: file
        name: artifacts
        required: true
        type: array
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ResponseSuccessData-artifacts_UploadedArtifactsDto'
        "400":
          description: Bad request - missing required field or no files uploaded
          schema:
            $ref: '#/definitions/response.ErrorResponseData-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponseData-any'
      summary: Upload artifact
      tags:
      - artifacts
  /artifacts/{object_key}:
    delete:
      consumes:
      - application/json
      description: Deletes one or more artifacts. Supports deletion via object key
        in the URL path (single delete) or via request body with multiple object keys
        (batch delete).
      parameters:
      - description: Single object key to delete (in URL path)
        in: path
        name: object_key
        type: string
      - description: Multiple object keys to delete (in request body)
        in: body
        name: request
        schema:
          $ref: '#/definitions/artifacts.DeleteArtifactsDto'
      produces:
      - application/json
      responses:
        "204":
          description: Artifacts deleted successfully
        "400":
          description: Bad request - invalid payload, empty keys, or deletion error
          schema:
            $ref: '#/definitions/response.ErrorResponseData-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponseData-any'
      summary: Delete artifacts
      tags:
      - artifacts
  /artifacts/download/{object_key}:
    get:
      consumes:
      - multipart/form-data
      description: Dowload a single artifact file with system metadata (arch, os,
        username, hostname). Supports multipart/form-data with file and form fields.
      parameters:
      - description: Object key
        example: linux/amd64/2026/7/22/071671ad-acbd-4c77-9132-b936ad1187c9_artinux_build.gz
        in: path
        name: object_key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResponseSuccessData-any'
        "400":
          description: Bad request - missing required field or no files uploaded
          schema:
            $ref: '#/definitions/response.ErrorResponseData-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponseData-any'
      summary: Download artifact
      tags:
      - artifacts
  /health:
    get:
      description: Runs Ping(ctx) for each configured pingable and reports per-component
        readiness.
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/response.ResponseSuccessData-http_healthResult'
      summary: Health check
      tags:
      - health
swagger: "2.0"
