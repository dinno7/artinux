name: Lint & Format

on:
  pull_request:
    branches:
      - main
      - dev

# Grant the jobs required permissions for OIDC to work
permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.7"

      - name: Install dependencies
        run: go mod tidy

      - name: Run go fmt
        run: go fmt ./...

      - name: Run go vet
        run: go vet ./...

