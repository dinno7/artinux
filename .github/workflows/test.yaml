name: Test

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  Test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.7"

      - name: Test
        run: go test -v ./...
