services:
  minio:
    image: quay.io/minio/minio
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9090:9090"
    command: ["server", "/data", "--console-address", ":9090"]
    volumes:
      - data-minio:/data
    environment:
      - MINIO_ROOT_USER=dinno
      - MINIO_ROOT_PASSWORD=123456789
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

  artinux:
    image: ghcr.io/dinno7/artinux:latest
    container_name: artinux
    ports:
      - 7000:7000
    volumes:
      - ./config.yml:/app/config.yml:ro
    depends_on:
      minio:
        condition: service_healthy

volumes:
  data-minio:
