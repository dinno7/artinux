services:
  minio:
    image: quay.io/minio/minio
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9090:9090"
    command: ["server", "/data", "--console-address", ":9090"]
    volumes:
      - data-minio:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER?Please set MINIO_ROOT_USER in .env}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD?Please set MINIO_ROOT_PASSWORD in .env}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  data-minio:
